name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - dev
      - "issue_*/**"
      - "feature/*"
      - "fix/*"
      - "chore/*"

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.app }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: postgresql://ci_user:ci_password@localhost:5432/ci_db
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: backend
            node_version: 22
          - app: frontend
            node_version: 20

    defaults:
      run:
        working-directory: ${{ matrix.app }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node_version }}

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --include=dev --no-package-lock
          fi

      - name: Build application
        run: npm run build

  docker-smoke-test:
    name: Docker smoke test
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20
    env:
      CI_POSTGRES_USER: ${{ secrets.CI_POSTGRES_USER }}
      CI_POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD }}
      CI_POSTGRES_DB: ${{ secrets.CI_POSTGRES_DB }}
      CI_POSTGRES_PORT: ${{ secrets.CI_POSTGRES_PORT }}
      CI_DATABASE_URL: ${{ secrets.CI_DATABASE_URL }}
      CI_BACKEND_PORT: ${{ secrets.CI_BACKEND_PORT }}
      CI_FRONTEND_PORT: ${{ secrets.CI_FRONTEND_PORT }}
      CI_JWT_SECRET: ${{ secrets.CI_JWT_SECRET }}
      CI_FRONTEND_ORIGIN: ${{ secrets.CI_FRONTEND_ORIGIN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Prepare CI environment
        run: |
          POSTGRES_USER="${CI_POSTGRES_USER:-ci_user}"
          POSTGRES_PASSWORD="${CI_POSTGRES_PASSWORD:-ci_password}"
          POSTGRES_DB="${CI_POSTGRES_DB:-ci_db}"
          POSTGRES_PORT="${CI_POSTGRES_PORT:-5432}"
          BACKEND_PORT="${CI_BACKEND_PORT:-4000}"
          FRONTEND_PORT="${CI_FRONTEND_PORT:-3000}"
          JWT_SECRET="${CI_JWT_SECRET:-ci_jwt_secret}"
          FRONTEND_ORIGIN="${CI_FRONTEND_ORIGIN:-http://localhost:${FRONTEND_PORT}}"
          DATABASE_URL="${CI_DATABASE_URL:-postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}}"

          cat <<EOF > .env
          POSTGRES_USER=${POSTGRES_USER}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          POSTGRES_DB=${POSTGRES_DB}
          POSTGRES_PORT=${POSTGRES_PORT}
          DATABASE_URL=${DATABASE_URL}
          BACKEND_PORT=${BACKEND_PORT}
          FRONTEND_PORT=${FRONTEND_PORT}
          JWT_SECRET=${JWT_SECRET}
          FRONTEND_ORIGIN=${FRONTEND_ORIGIN}
          EOF

      - name: Build and start stack
        run: docker compose up --build -d --wait

      - name: Run smoke test
        run: bash scripts/smoke-test.sh

      - name: Show compose logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Tear down stack
        if: always()
        run: docker compose down -v --rmi local
