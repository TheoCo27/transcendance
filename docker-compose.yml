services:
  frontend:
    image: frontend_img
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: quiz_frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app
      - ./certs:/certs:ro
      - /app/node_modules
    env_file:
      - .env
    environment:
      BACKEND_TARGET: https://backend:4000
      NODE_EXTRA_CA_CERTS: /certs/mkcert-rootCA.pem
      SSL_CERT_FILE: /certs/mkcert-rootCA.pem
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "const url = process.env.FRONTEND_ORIGIN || 'https://localhost:3000'; fetch(url).then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  backend:
    image: backend_img
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: quiz_backend
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    volumes:
      - ./backend:/app
      - ./certs:/certs:ro
      - /app/node_modules
    env_file:
      - .env
    environment:
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-https://localhost:3000}
      NODE_EXTRA_CA_CERTS: /certs/mkcert-rootCA.pem
      SSL_CERT_FILE: /certs/mkcert-rootCA.pem
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('https://127.0.0.1:4000/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  db:
    image: db_img
    build:
      context: ./db
      dockerfile: Dockerfile
    container_name: quiz_db
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped

volumes:
  postgres_data:
    name: postgres_volume

networks:
  default:
    name: quiz_network
